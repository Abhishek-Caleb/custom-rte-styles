operations:
  view:
    - type: web
      impl: index.html
actions: actions
web: web-src
runtimeManifest:
  packages:
    custom-rte-styles:
      actions:
        fetch-rte-styles:
          function: actions/fetch-rte-styles/index.js
          web: 'yes'
          runtime: nodejs:18
hooks:
  pre-app-run: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  pre-app-build: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  post-app-deploy: ./hooks/post-deploy.js
